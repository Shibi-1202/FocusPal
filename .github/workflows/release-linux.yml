name: Release Linux

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-linux-production
  cancel-in-progress: false

jobs:
  release-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    env:
      APT_PREFIX: ${{ vars.APT_PREFIX }}
      APT_DISTRIBUTION: ${{ vars.APT_DISTRIBUTION }}
      APT_COMPONENT: ${{ vars.APT_COMPONENT }}
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      R2_ENDPOINT: ${{ vars.R2_ENDPOINT }}
      R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
      CLOUDFLARE_ZONE_ID: ${{ vars.CLOUDFLARE_ZONE_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly gnupg dpkg-dev lintian libarchive-tools unzip

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Supabase config
        env:
          SUPABASE_CONFIG_JSON: ${{ secrets.SUPABASE_CONFIG_JSON }}
        run: |
          install -d packages/desktop/config
          printf '%s\n' "$SUPABASE_CONFIG_JSON" > packages/desktop/config/supabase.json

      - name: Validate release variables
        run: |
          test -n "$APT_PREFIX"
          test -n "$APT_DISTRIBUTION"
          test -n "$APT_COMPONENT"
          test -n "$R2_BUCKET"
          test -n "$R2_ENDPOINT"
          test -n "$R2_PUBLIC_BASE_URL"

      - name: Validate release secrets
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$R2_ACCESS_KEY_ID"
          test -n "$R2_SECRET_ACCESS_KEY"
          if [[ -n "$CLOUDFLARE_ZONE_ID" ]]; then
            test -n "$CLOUDFLARE_API_TOKEN"
          fi

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PACKAGE_VERSION="$(node -p 'require("./packages/desktop/package.json").version')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag version ($TAG_VERSION) does not match package version ($PACKAGE_VERSION)." >&2
            exit 1
          fi

      - name: Run tests
        run: pnpm --filter @focuspal/desktop test

      - name: Import APT signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: |
          RAW_KEY_FILE="$(mktemp)"
          PREPARED_KEY_FILE="$(mktemp)"
          CLEAN_KEY_FILE="$(mktemp)"
          trap 'rm -f "$RAW_KEY_FILE" "$PREPARED_KEY_FILE" "$CLEAN_KEY_FILE"' EXIT

          printf '%s' "$APT_GPG_PRIVATE_KEY" > "$RAW_KEY_FILE"

          if grep -Eq -- '-----BEGIN PGP (PRIVATE|SECRET) KEY BLOCK-----' "$RAW_KEY_FILE"; then
            cp "$RAW_KEY_FILE" "$PREPARED_KEY_FILE"
          elif printf '%b' "$APT_GPG_PRIVATE_KEY" | grep -Eq -- '-----BEGIN PGP (PRIVATE|SECRET) KEY BLOCK-----'; then
            printf '%b' "$APT_GPG_PRIVATE_KEY" > "$PREPARED_KEY_FILE"
          elif printf '%s' "$APT_GPG_PRIVATE_KEY" | base64 -d > "$PREPARED_KEY_FILE" 2>/dev/null \
            && grep -Eq -- '-----BEGIN PGP (PRIVATE|SECRET) KEY BLOCK-----' "$PREPARED_KEY_FILE"; then
            :
          else
            echo "APT_GPG_PRIVATE_KEY is not valid OpenPGP private key data." >&2
            echo "Supported formats: raw armored key, armored key with literal \\n escapes, or base64-encoded armored key." >&2
            exit 1
          fi

          awk '
            /-----BEGIN PGP (PRIVATE|SECRET) KEY BLOCK-----/ { keep = 1 }
            keep {
              sub(/\r$/, "")
              print
            }
            /-----END PGP (PRIVATE|SECRET) KEY BLOCK-----/ { exit }
          ' "$PREPARED_KEY_FILE" > "$CLEAN_KEY_FILE"

          if ! grep -Eq -- 'BEGIN PGP (PRIVATE|SECRET) KEY BLOCK' "$CLEAN_KEY_FILE"; then
            echo "APT_GPG_PRIVATE_KEY does not contain a valid armored private key block." >&2
            exit 1
          fi

          gpg --batch --import "$CLEAN_KEY_FILE"

          if ! gpg --list-secret-keys --with-colons "$APT_GPG_KEY_ID" | grep -q '^sec'; then
            echo "Expected GPG secret key $APT_GPG_KEY_ID was not imported." >&2
            exit 1
          fi

          gpg --list-secret-keys --keyid-format LONG

      - name: Build Linux artifacts
        run: pnpm build:linux

      - name: Inspect Debian package
        run: |
          dpkg-deb -I packages/desktop/dist/FocusPal-*.deb
          lintian packages/desktop/dist/FocusPal-*.deb

      - name: Publish APT repository
        env:
          APT_GPG_KEY: ${{ secrets.APT_GPG_KEY_ID }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          APT_BATCH_SIGNING: "1"
        run: ./scripts/publish-apt.sh

      - name: Determine package version
        id: version
        run: |
          VERSION="$(node -p 'require("./packages/desktop/package.json").version')"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload APT repository to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          APT_SOURCE_DIR="$HOME/.aptly/public"
          APT_DEST_URI="s3://$R2_BUCKET"

          if [[ "$APT_PREFIX" != "." ]]; then
            APT_SOURCE_DIR="$APT_SOURCE_DIR/$APT_PREFIX"
            APT_DEST_URI="$APT_DEST_URI/$APT_PREFIX"
          fi

          aws s3 sync "$APT_SOURCE_DIR/" "$APT_DEST_URI/" --delete --endpoint-url "$R2_ENDPOINT"

      - name: Upload Linux installers to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          AWS_DEFAULT_REGION: auto
          AWS_EC2_METADATA_DISABLED: "true"
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          aws s3 cp "packages/desktop/dist/FocusPal-$VERSION.deb" "s3://$R2_BUCKET/linux/$VERSION/FocusPal-$VERSION.deb" --endpoint-url "$R2_ENDPOINT"
          aws s3 cp "packages/desktop/dist/FocusPal-$VERSION.AppImage" "s3://$R2_BUCKET/linux/$VERSION/FocusPal-$VERSION.AppImage" --endpoint-url "$R2_ENDPOINT"

      - name: Purge Cloudflare cache prefixes
        if: env.CLOUDFLARE_ZONE_ID != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: bash ./scripts/purge-cloudflare-cache.sh

      - name: Upload build artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: focuspal-linux-${{ steps.version.outputs.value }}
          path: |
            packages/desktop/dist/FocusPal-*.deb
            packages/desktop/dist/FocusPal-*.AppImage
