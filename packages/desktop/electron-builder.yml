appId: com.focuspal.app
productName: FocusPal
copyright: Copyright © 2024

directories:
  output: dist
  buildResources: assets

files:
  - src/**/*
  - assets/**/*
  - package.json
  - "!**/{.git,.gitignore,.env,.env.*}"
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/.bin"
  - "!**/*.{iml,o,hprof,orig,pyc,pyo,rbc,swp,csproj,sln,xproj}"
  - "!.editorconfig"
  - "!**/._*"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,.gitignore,.gitattributes}"

extraResources:
  - from: config/supabase.json
    to: config/supabase.json

linux:
  icon: assets/icon.png
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Utility
  maintainer: FocusPal Team
  synopsis: A smart floating productivity companion
  description: FocusPal helps you manage time-blocked tasks, maintain focus, and build productive habits.

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: FocusPal

portable:
  artifactName: ${productName}-${version}-portable.${ext}

appImage:
  artifactName: ${productName}-${version}.${ext}

deb:
  packageName: focuspal
  artifactName: ${productName}-${version}.${ext}
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3

publish: null
